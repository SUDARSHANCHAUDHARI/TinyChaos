name: Deploy TinyChaos to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out gallery and project submodules
        id: checkout
        continue-on-error: true
        uses: actions/checkout@v7
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN || github.token }}

      - name: Report unavailable private submodules
        if: steps.checkout.outcome == 'failure'
        run: echo "::warning::One or more private project submodules were unavailable. The independent parent gallery will still be deployed."

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Prepare gallery artifact
        run: |
          mkdir -p _site/assets/illustrations
          cp index.html style.css script.js projects.json _site/
          cp -R assets/illustrations/. _site/assets/illustrations/

      - name: Upload gallery artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
